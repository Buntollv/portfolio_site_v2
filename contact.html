<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты - Моё портфолио</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul class="nav-menu">
                <li><a href="index.html">Главная</a></li>
                <li><a href="about.html">О себе</a></li>
                <li><a href="projects.html">Проекты</a></li>
                <li><a href="contact.html" class="active">Контакты</a></li>
            </ul>
            <button id="theme-toggle" class="theme-btn">🌙 Темная тема</button>
        </nav>
    </header>

    <main>
        <section class="contact">
            <h1>Контакты</h1>

            <div class="contact-container">
                <div class="contact-form">
                    <h2>Напишите мне</h2>
                    <form id="feedback-form">
                        <div class="form-group">
                            <label for="name">Имя:</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Сообщение:</label>
                            <textarea id="message" name="message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">Отправить</button>
                    </form>
                </div>

                <div class="contact-info">
                    <h2>Контактная информация</h2>
                    <p><strong>Email:</strong> ваш.email@example.com</p>
                    
                    <h3>Социальные сети:</h3>
                    <ul class="social-links">
                        <li><a href="#" target="_blank">📱 Telegram</a></li>
                        <li><a href="#" target="_blank">📷 Instagram</a></li>
                        <li><a href="#" target="_blank">💼 LinkedIn</a></li>
                    </ul>

                    <h3>GitHub:</h3>
                    <a href="#" target="_blank" class="github-link">🐙 github.com/ваш-никнейм</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 [Ваш Никнейм]. Все права защищены.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
